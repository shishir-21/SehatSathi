services:
  backend:
    build:
      context: ./sehatsathi-backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/sehatsathi
      - JWT_SECRET=supersecretjwtkey
    depends_on:
      - mongo

  frontend:
    build:
      context: ./sehatsathi-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=https://sehatsathi-y19n.onrender.com
    depends_on:
      - backend

  mongo:
    image: mongo:6
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:
